<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 300" role="img" data-pathway="lipids">
<title>Липидный обмен</title><desc>Печень синтезирует ЛПНП/ЛПОНП; ЛПВП — обратный транспорт; индекс атерогенности, сосудистая стенка.</desc>
<style>
.node-shape{fill:#EEF0F2;stroke:#8A8F98;stroke-width:1;}
.lbl{font-family:Arial,Helvetica,sans-serif;fill:#22303C;}
.lbl-t{font-weight:600;font-size:14px;}
.lbl-s{font-size:12px;fill:#5A6672;}
.edge{stroke:#9AA3AD;stroke-width:1.2;fill:none;}
[data-sev="norm"] .node-shape{fill:#E6F4EA;stroke:#3B8E5A;}
[data-sev="mild"] .node-shape{fill:#FBF3D6;stroke:#C9A227;}
[data-sev="moderate"] .node-shape{fill:#FBE7D2;stroke:#D97B29;}
[data-sev="severe"] .node-shape{fill:#F7D9D9;stroke:#C0392B;}
[data-sev="nodata"] .node-shape{fill:#F1EFE8;stroke:#B4B2A9;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<line x1="162" y1="122" x2="208" y2="106" class="edge" marker-end="url(#arrow)"/>
<line x1="162" y1="154" x2="208" y2="161" class="edge" marker-end="url(#arrow)"/>
<line x1="342" y1="82" x2="368" y2="82" class="edge" marker-end="url(#arrow)"/>
<line x1="342" y1="173" x2="368" y2="174" class="edge" marker-end="url(#arrow)"/>
<line x1="532" y1="175" x2="548" y2="175" class="edge" marker-end="url(#arrow)"/>
<line x1="236" y1="228" x2="142" y2="170" class="edge" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<g class="node" data-node-id="liver" data-node-type="organ"><rect class="node-shape" x="40" y="120" width="120" height="48" rx="8"/><text class="lbl lbl-t" x="100.0" y="144.0" text-anchor="middle" dominant-baseline="central">Печень</text></g>
<g class="node" data-node-id="vldl" data-node-type="marker"><rect class="node-shape" x="210" y="60" width="130" height="44" rx="8"/><text class="lbl lbl-t" x="275.0" y="82.0" text-anchor="middle" dominant-baseline="central">ЛПОНП</text></g>
<g class="node" data-node-id="ldl" data-node-type="marker"><rect class="node-shape" x="210" y="150" width="130" height="44" rx="8"/><text class="lbl lbl-t" x="275.0" y="172.0" text-anchor="middle" dominant-baseline="central">ЛПНП</text></g>
<g class="node" data-node-id="tg" data-node-type="marker"><rect class="node-shape" x="370" y="60" width="150" height="44" rx="8"/><text class="lbl lbl-t" x="445.0" y="82.0" text-anchor="middle" dominant-baseline="central">Триглицериды</text></g>
<g class="node" data-node-id="hdl" data-node-type="marker"><rect class="node-shape" x="210" y="230" width="130" height="44" rx="8"/><text class="lbl lbl-t" x="275.0" y="252.0" text-anchor="middle" dominant-baseline="central">ЛПВП</text></g>
<g class="node" data-node-id="total_chol" data-node-type="marker"><rect class="node-shape" x="40" y="230" width="140" height="44" rx="8"/><text class="lbl lbl-t" x="110.0" y="252.0" text-anchor="middle" dominant-baseline="central">Общий ХС</text></g>
<g class="node" data-node-id="athero" data-node-type="index"><rect class="node-shape" x="370" y="150" width="160" height="50" rx="8"/><text class="lbl lbl-t" x="450.0" y="166.0" text-anchor="middle" dominant-baseline="central">Индекс</text><text class="lbl lbl-s" x="450.0" y="184.0" text-anchor="middle" dominant-baseline="central">атерогенности</text></g>
<g class="node" data-node-id="vessel" data-node-type="target"><rect class="node-shape" x="550" y="150" width="110" height="50" rx="8"/><text class="lbl lbl-t" x="605.0" y="166.0" text-anchor="middle" dominant-baseline="central">Сосудистая</text><text class="lbl lbl-s" x="605.0" y="184.0" text-anchor="middle" dominant-baseline="central">стенка</text></g>
</svg>
