<g class="node" data-node-id="albumin" data-node-type="marker"><rect class="node-shape" x="480" y="80" width="150" height="44" rx="8"/><text class="lbl lbl-t" x="555.0" y="102.0" text-anchor="middle" dominant-baseline="central">Альбумин</text></g>
