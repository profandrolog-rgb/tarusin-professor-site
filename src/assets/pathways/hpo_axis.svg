<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 430" role="img" data-pathway="hpo_axis">
<title>Гипоталамо-гипофизарно-яичниковая ось</title><desc>Гипоталамус — гипофиз (ЛГ, ФСГ) — яичник (фолликул, жёлтое тело) — эстрадиол, прогестерон; АМГ, ингибин B, пролактин, эндометрий.</desc>
<style>
.node-shape{fill:#EEF0F2;stroke:#8A8F98;stroke-width:1;}
.lbl{font-family:Arial,Helvetica,sans-serif;fill:#22303C;}
.lbl-t{font-weight:600;font-size:14px;}
.lbl-s{font-size:12px;fill:#5A6672;}
.edge{stroke:#9AA3AD;stroke-width:1.2;fill:none;}
