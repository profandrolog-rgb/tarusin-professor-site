<g class="node" data-node-id="crh" data-node-type="signal"><rect class="node-shape" x="200" y="60" width="150" height="52" rx="8"/><text class="lbl lbl-t" x="275.0" y="77.0" text-anchor="middle" dominant-baseline="central">КРГ</text><text class="lbl lbl-s" x="275.0" y="95.0" text-anchor="middle" dominant-baseline="central">гипоталамус</text></g>
