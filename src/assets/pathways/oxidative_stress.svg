<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 310" role="img" data-pathway="oxidative_stress">
<title>Оксидативный стресс</title><desc>АФК против антиоксидантной защиты: глутатион, селен, витамины E и C, мочевая кислота.</desc>
<style>
.node-shape{fill:#EEF0F2;stroke:#8A8F98;stroke-width:1;}
.lbl{font-family:Arial,Helvetica,sans-serif;fill:#22303C;}
.lbl-t{font-weight:600;font-size:14px;}
.lbl-s{font-size:12px;fill:#5A6672;}
.edge{stroke:#9AA3AD;stroke-width:1.2;fill:none;}
[data-sev="norm"] .node-shape{fill:#E6F4EA;stroke:#3B8E5A;}
[data-sev="mild"] .node-shape{fill:#FBF3D6;stroke:#C9A227;}
[data-sev="moderate"] .node-shape{fill:#FBE7D2;stroke:#D97B29;}
[data-sev="severe"] .node-shape{fill:#F7D9D9;stroke:#C0392B;}
[data-sev="nodata"] .node-shape{fill:#F1EFE8;stroke:#B4B2A9;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<line x1="162" y1="145" x2="438" y2="145" class="edge" marker-end="url(#arrow)"/>
<line x1="356" y1="86" x2="450" y2="118" class="edge" marker-end="url(#arrow)"/>
<line x1="362" y1="136" x2="438" y2="140" class="edge" marker-end="url(#arrow)"/>
<line x1="362" y1="184" x2="438" y2="166" class="edge" marker-end="url(#arrow)"/>
<line x1="331" y1="248" x2="478" y2="172" class="edge" marker-end="url(#arrow)"/>
<g class="node" data-node-id="ros" data-node-type="signal"><rect class="node-shape" x="40" y="120" width="120" height="50" rx="8"/><text class="lbl lbl-t" x="100.0" y="136.0" text-anchor="middle" dominant-baseline="central">АФК</text><text class="lbl lbl-s" x="100.0" y="154.0" text-anchor="middle" dominant-baseline="central">ROS</text></g>
<g class="node" data-node-id="antiox" data-node-type="process"><rect class="node-shape" x="440" y="120" width="180" height="50" rx="8"/><text class="lbl lbl-t" x="530.0" y="136.0" text-anchor="middle" dominant-baseline="central">Антиоксидантная</text><text class="lbl lbl-s" x="530.0" y="154.0" text-anchor="middle" dominant-baseline="central">защита</text></g>
<g class="node" data-node-id="glutathione" data-node-type="cofactor"><rect class="node-shape" x="210" y="40" width="150" height="44" rx="8"/><text class="lbl lbl-t" x="285.0" y="62.0" text-anchor="middle" dominant-baseline="central">Глутатион</text></g>
<g class="node" data-node-id="selenium_ox" data-node-type="cofactor"><rect class="node-shape" x="210" y="110" width="150" height="44" rx="8"/><text class="lbl lbl-t" x="285.0" y="132.0" text-anchor="middle" dominant-baseline="central">Селен</text></g>
<g class="node" data-node-id="vit_e" data-node-type="cofactor"><rect class="node-shape" x="210" y="180" width="150" height="44" rx="8"/><text class="lbl lbl-t" x="285.0" y="202.0" text-anchor="middle" dominant-baseline="central">Витамин E</text></g>
<g class="node" data-node-id="vit_c" data-node-type="cofactor"><rect class="node-shape" x="210" y="250" width="150" height="44" rx="8"/><text class="lbl lbl-t" x="285.0" y="272.0" text-anchor="middle" dominant-baseline="central">Витамин C</text></g>
<g class="node" data-node-id="uric_acid" data-node-type="marker"><rect class="node-shape" x="440" y="220" width="180" height="50" rx="8"/><text class="lbl lbl-t" x="530.0" y="236.0" text-anchor="middle" dominant-baseline="central">Мочевая</text><text class="lbl lbl-s" x="530.0" y="254.0" text-anchor="middle" dominant-baseline="central">кислота</text></g>
</svg>
