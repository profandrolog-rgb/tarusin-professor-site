<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 330" role="img" data-pathway="methylation">
<title>Метилирование / одноуглеродный обмен</title>
<desc>Метионин, SAM, SAH, гомоцистеин; ветви реметилирования (B12, фолат) и транссульфурации (B6).</desc>
<style>
.node-shape{fill:#EEF0F2;stroke:#8A8F98;stroke-width:1;}
.lbl{font-family:Arial,Helvetica,sans-serif;fill:#22303C;}
.lbl-t{font-weight:600;font-size:14px;}
.lbl-s{font-size:12px;fill:#5A6672;}
.edge{stroke:#9AA3AD;stroke-width:1.2;fill:none;}
[data-sev="norm"] .node-shape{fill:#E6F4EA;stroke:#3B8E5A;}
[data-sev="mild"] .node-shape{fill:#FBF3D6;stroke:#C9A227;}
[data-sev="moderate"] .node-shape{fill:#FBE7D2;stroke:#D97B29;}
[data-sev="severe"] .node-shape{fill:#F7D9D9;stroke:#C0392B;}
[data-sev="nodata"] .node-shape{fill:#F1EFE8;stroke:#B4B2A9;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<line x1="150" y1="65" x2="188" y2="65" class="edge" marker-end="url(#arrow)"/>
<line x1="290" y1="65" x2="328" y2="65" class="edge" marker-end="url(#arrow)"/>
<line x1="430" y1="65" x2="468" y2="65" class="edge" marker-end="url(#arrow)"/>
<path d="M545 90 L545 125 L205 125 L205 148" class="edge" marker-end="url(#arrow)"/>
<path d="M545 90 L545 125 L485 125 L485 148" class="edge" marker-end="url(#arrow)"/>
<path d="M110 175 L25 175 L25 65 L38 65" class="edge" marker-end="url(#arrow)"/>
<line x1="140" y1="248" x2="140" y2="202" class="edge" marker-end="url(#arrow)"/>
<line x1="255" y1="248" x2="255" y2="202" class="edge" marker-end="url(#arrow)"/>
<line x1="485" y1="248" x2="485" y2="202" class="edge" marker-end="url(#arrow)"/>

<g class="node" data-node-id="methionine" data-node-type="metabolite"><rect class="node-shape" x="40" y="40" width="110" height="50" rx="8"/><text class="lbl lbl-t" x="95" y="65" text-anchor="middle" dominant-baseline="central">Метионин</text></g>
<g class="node" data-node-id="sam" data-node-type="metabolite"><rect class="node-shape" x="190" y="40" width="100" height="50" rx="8"/><text class="lbl lbl-t" x="240" y="58" text-anchor="middle" dominant-baseline="central">SAM</text><text class="lbl lbl-s" x="240" y="76" text-anchor="middle" dominant-baseline="central">донор CH3</text></g>
<g class="node" data-node-id="sah" data-node-type="metabolite"><rect class="node-shape" x="330" y="40" width="100" height="50" rx="8"/><text class="lbl lbl-t" x="380" y="58" text-anchor="middle" dominant-baseline="central">SAH</text><text class="lbl lbl-s" x="380" y="76" text-anchor="middle" dominant-baseline="central">продукт</text></g>
<g class="node" data-node-id="homocysteine" data-node-type="metabolite"><rect class="node-shape" x="470" y="40" width="150" height="50" rx="8"/><text class="lbl lbl-t" x="545" y="65" text-anchor="middle" dominant-baseline="central">Гомоцистеин</text></g>

<g class="node" data-node-id="remethylation" data-node-type="process"><rect class="node-shape" x="110" y="150" width="190" height="50" rx="8"/><text class="lbl lbl-t" x="205" y="175" text-anchor="middle" dominant-baseline="central">Реметилирование</text></g>
<g class="node" data-node-id="transsulfuration" data-node-type="process"><rect class="node-shape" x="390" y="150" width="190" height="50" rx="8"/><text class="lbl lbl-t" x="485" y="175" text-anchor="middle" dominant-baseline="central">Транссульфурация</text></g>

<g class="node" data-node-id="b12" data-node-type="cofactor"><rect class="node-shape" x="95" y="250" width="90" height="40" rx="8"/><text class="lbl lbl-t" x="140" y="270" text-anchor="middle" dominant-baseline="central">B12</text></g>
<g class="node" data-node-id="folate" data-node-type="cofactor"><rect class="node-shape" x="200" y="250" width="110" height="40" rx="8"/><text class="lbl lbl-t" x="255" y="270" text-anchor="middle" dominant-baseline="central">Фолат (B9)</text></g>
<g class="node" data-node-id="b6" data-node-type="cofactor"><rect class="node-shape" x="430" y="250" width="110" height="40" rx="8"/><text class="lbl lbl-t" x="485" y="270" text-anchor="middle" dominant-baseline="central">Витамин B6</text></g>
</svg>
