<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 300" role="img" data-pathway="thyroid">
<title>Щитовидная ось</title>
<desc>ТРГ — ТТГ (гипофиз) — щитовидная железа — Т4 свободный — Т3 свободный — ткани; АТ-ТПО.</desc>
<style>
