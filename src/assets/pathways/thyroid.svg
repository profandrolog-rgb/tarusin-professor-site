<g class="node" data-node-id="pituitary_tsh" data-node-type="signal"><rect class="node-shape" x="190" y="44" width="110" height="52" rx="8"/><text class="lbl lbl-t" x="245" y="63" text-anchor="middle" dominant-baseline="central">ТТГ</text><text class="lbl lbl-s" x="245" y="81" text-anchor="middle" dominant-baseline="central">гипофиз</text></g>
