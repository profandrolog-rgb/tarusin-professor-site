<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 320" role="img" data-pathway="iron">
<title>Обмен железа</title>
<desc>Депо (ферритин), транспорт (трансферрин, насыщение, ОЖСС), сывороточное железо, эритрон (гемоглобин, MCV).</desc>
<style>
.node-shape{fill:#EEF0F2;stroke:#8A8F98;stroke-width:1;}
.lbl{font-family:Arial,Helvetica,sans-serif;fill:#22303C;}
.lbl-t{font-weight:600;font-size:14px;}
.lbl-s{font-size:12px;fill:#5A6672;}
.edge{stroke:#9AA3AD;stroke-width:1.2;fill:none;}
[data-sev="norm"] .node-shape{fill:#E6F4EA;stroke:#3B8E5A;}
[data-sev="mild"] .node-shape{fill:#FBF3D6;stroke:#C9A227;}
[data-sev="moderate"] .node-shape{fill:#FBE7D2;stroke:#D97B29;}
[data-sev="severe"] .node-shape{fill:#F7D9D9;stroke:#C0392B;}
[data-sev="nodata"] .node-shape{fill:#F1EFE8;stroke:#B4B2A9;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<line x1="190" y1="70" x2="263" y2="70" class="edge" marker-end="url(#arrow)"/>
<line x1="425" y1="70" x2="498" y2="70" class="edge" marker-end="url(#arrow)"/>
<line x1="345" y1="96" x2="345" y2="128" class="edge" marker-end="url(#arrow)"/>
<line x1="115" y1="96" x2="115" y2="198" class="edge" marker-end="url(#arrow)"/>
<line x1="190" y1="220" x2="263" y2="150" class="edge" marker-end="url(#arrow)"/>

<g class="node" data-node-id="ferritin_store" data-node-type="store"><rect class="node-shape" x="40" y="44" width="150" height="52" rx="8"/><text class="lbl lbl-t" x="115" y="63" text-anchor="middle" dominant-baseline="central">Депо железа</text><text class="lbl lbl-s" x="115" y="81" text-anchor="middle" dominant-baseline="central">ферритин</text></g>

<g class="node" data-node-id="tsat" data-node-type="marker"><rect class="node-shape" x="265" y="44" width="160" height="52" rx="8"/><text class="lbl lbl-t" x="345" y="63" text-anchor="middle" dominant-baseline="central">Насыщение</text><text class="lbl lbl-s" x="345" y="81" text-anchor="middle" dominant-baseline="central">трансферрина</text></g>
<g class="node" data-node-id="transferrin" data-node-type="transport"><rect class="node-shape" x="265" y="128" width="160" height="46" rx="8"/><text class="lbl lbl-t" x="345" y="151" text-anchor="middle" dominant-baseline="central">Трансферрин</text></g>
<g class="node" data-node-id="tibc" data-node-type="marker"><rect class="node-shape" x="445" y="128" width="120" height="46" rx="8"/><text class="lbl lbl-t" x="505" y="151" text-anchor="middle" dominant-baseline="central">ОЖСС</text></g>

<g class="node" data-node-id="erythron" data-node-type="target"><rect class="node-shape" x="500" y="44" width="150" height="52" rx="8"/><text class="lbl lbl-t" x="575" y="63" text-anchor="middle" dominant-baseline="central">Эритрон</text><text class="lbl lbl-s" x="575" y="81" text-anchor="middle" dominant-baseline="central">Hb · MCV</text></g>
<g class="node" data-node-id="hemoglobin" data-node-type="marker"><rect class="node-shape" x="510" y="200" width="130" height="44" rx="8"/><text class="lbl lbl-t" x="575" y="222" text-anchor="middle" dominant-baseline="central">Гемоглобин</text></g>
<g class="node" data-node-id="mcv" data-node-type="marker"><rect class="node-shape" x="510" y="256" width="130" height="44" rx="8"/><text class="lbl lbl-t" x="575" y="278" text-anchor="middle" dominant-baseline="central">MCV</text></g>
<line x1="575" y1="96" x2="575" y2="198" class="edge" marker-end="url(#arrow)"/>
<line x1="575" y1="244" x2="575" y2="254" class="edge"/>

<g class="node" data-node-id="serum_iron" data-node-type="marker"><rect class="node-shape" x="40" y="200" width="150" height="52" rx="8"/><text class="lbl lbl-t" x="115" y="219" text-anchor="middle" dominant-baseline="central">Сыв. железо</text><text class="lbl lbl-s" x="115" y="237" text-anchor="middle" dominant-baseline="central">транспортное</text></g>
</svg>
