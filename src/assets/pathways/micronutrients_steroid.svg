<g class="node" data-node-id="zn_cu" data-node-type="index"><rect class="node-shape" x="210" y="100" width="120" height="46" rx="8"/><text class="lbl lbl-t" x="270.0" y="123.0" text-anchor="middle" dominant-baseline="central">Zn/Cu</text></g>
