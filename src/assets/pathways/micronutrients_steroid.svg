<g class="node" data-node-id="copper" data-node-type="cofactor"><rect class="node-shape" x="40" y="140" width="120" height="46" rx="8"/><text class="lbl lbl-t" x="100.0" y="163.0" text-anchor="middle" dominant-baseline="central">Медь</text></g>
