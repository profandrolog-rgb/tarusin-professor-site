<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 300" role="img" data-pathway="prolactin_reg">
<title>Пролактин / гипоталамическая регуляция</title><desc>Дофамин тормозит лактотрофы; пролактин подавляет гонадную ось; макропролактин, связь с ТТГ и стрессом.</desc>
<style>
.node-shape{fill:#EEF0F2;stroke:#8A8F98;stroke-width:1;}
.lbl{font-family:Arial,Helvetica,sans-serif;fill:#22303C;}
.lbl-t{font-weight:600;font-size:14px;}
.lbl-s{font-size:12px;fill:#5A6672;}
.edge{stroke:#9AA3AD;stroke-width:1.2;fill:none;}
[data-sev="norm"] .node-shape{fill:#E6F4EA;stroke:#3B8E5A;}
[data-sev="mild"] .node-shape{fill:#FBF3D6;stroke:#C9A227;}
[data-sev="moderate"] .node-shape{fill:#FBE7D2;stroke:#D97B29;}
[data-sev="severe"] .node-shape{fill:#F7D9D9;stroke:#C0392B;}
[data-sev="nodata"] .node-shape{fill:#F1EFE8;stroke:#B4B2A9;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<line x1="172" y1="134" x2="218" y2="133" class="edge" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="382" y1="132" x2="428" y2="132" class="edge" marker-end="url(#arrow)"/>
<line x1="507" y1="108" x2="508" y2="92" class="edge" marker-end="url(#arrow)"/>
<line x1="505" y1="158" x2="505" y2="188" class="edge" marker-end="url(#arrow)"/>
<line x1="202" y1="79" x2="428" y2="119" class="edge" marker-end="url(#arrow)"/>
<line x1="172" y1="208" x2="428" y2="150" class="edge" marker-end="url(#arrow)"/>
<g class="node" data-node-id="dopamine" data-node-type="signal"><rect class="node-shape" x="40" y="110" width="130" height="50" rx="8"/><text class="lbl lbl-t" x="105.0" y="126.0" text-anchor="middle" dominant-baseline="central">Дофамин</text><text class="lbl lbl-s" x="105.0" y="144.0" text-anchor="middle" dominant-baseline="central">(−)</text></g>
<g class="node" data-node-id="lactotroph" data-node-type="organ"><rect class="node-shape" x="220" y="105" width="160" height="52" rx="8"/><text class="lbl lbl-t" x="300.0" y="122.0" text-anchor="middle" dominant-baseline="central">Лактотрофы</text><text class="lbl lbl-s" x="300.0" y="140.0" text-anchor="middle" dominant-baseline="central">гипофиза</text></g>
<g class="node" data-node-id="prolactin" data-node-type="hormone"><rect class="node-shape" x="430" y="110" width="150" height="46" rx="8"/><text class="lbl lbl-t" x="505.0" y="133.0" text-anchor="middle" dominant-baseline="central">Пролактин</text></g>
<g class="node" data-node-id="macroprl" data-node-type="marker"><rect class="node-shape" x="430" y="190" width="150" height="44" rx="8"/><text class="lbl lbl-t" x="505.0" y="212.0" text-anchor="middle" dominant-baseline="central">Макропролактин</text></g>
<g class="node" data-node-id="tsh_link" data-node-type="signal"><rect class="node-shape" x="40" y="40" width="160" height="50" rx="8"/><text class="lbl lbl-t" x="120.0" y="56.0" text-anchor="middle" dominant-baseline="central">ТТГ</text><text class="lbl lbl-s" x="120.0" y="74.0" text-anchor="middle" dominant-baseline="central">↑ при гипотиреозе</text></g>
<g class="node" data-node-id="stress" data-node-type="signal"><rect class="node-shape" x="40" y="200" width="130" height="46" rx="8"/><text class="lbl lbl-t" x="105.0" y="223.0" text-anchor="middle" dominant-baseline="central">Стресс</text></g>
<g class="node" data-node-id="gonadal" data-node-type="target"><rect class="node-shape" x="430" y="40" width="160" height="50" rx="8"/><text class="lbl lbl-t" x="510.0" y="56.0" text-anchor="middle" dominant-baseline="central">Подавление</text><text class="lbl lbl-s" x="510.0" y="74.0" text-anchor="middle" dominant-baseline="central">гонадной оси</text></g>
</svg>
