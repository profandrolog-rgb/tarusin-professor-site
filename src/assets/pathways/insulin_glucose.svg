<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 320" role="img" data-pathway="insulin_glucose">
<title>Инсулин-глюкоза / инсулинорезистентность</title>
<desc>Поджелудочная — инсулин — рецептор — мышцы/жир; глюкоза, HOMA-IR, HbA1c, C-пептид.</desc>
<style>
.node-shape{fill:#EEF0F2;stroke:#8A8F98;stroke-width:1;}
.lbl{font-family:Arial,Helvetica,sans-serif;fill:#22303C;}
.lbl-t{font-weight:600;font-size:14px;}
.lbl-s{font-size:12px;fill:#5A6672;}
.edge{stroke:#9AA3AD;stroke-width:1.2;fill:none;}
[data-sev="norm"] .node-shape{fill:#E6F4EA;stroke:#3B8E5A;}
[data-sev="mild"] .node-shape{fill:#FBF3D6;stroke:#C9A227;}
[data-sev="moderate"] .node-shape{fill:#FBE7D2;stroke:#D97B29;}
[data-sev="severe"] .node-shape{fill:#F7D9D9;stroke:#C0392B;}
[data-sev="nodata"] .node-shape{fill:#F1EFE8;stroke:#B4B2A9;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<line x1="190" y1="70" x2="228" y2="70" class="edge" marker-end="url(#arrow)"/>
<line x1="380" y1="70" x2="418" y2="70" class="edge" marker-end="url(#arrow)"/>
<line x1="570" y1="70" x2="608" y2="70" class="edge" marker-end="url(#arrow)"/>
<path d="M115 96 L115 130 L300 130 L300 44" class="edge" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<line x1="305" y1="200" x2="305" y2="96" class="edge" marker-end="url(#arrow)"/>
<line x1="130" y1="222" x2="130" y2="96" class="edge" marker-end="url(#arrow)"/>
<line x1="480" y1="222" x2="480" y2="96" class="edge" marker-end="url(#arrow)"/>

<g class="node" data-node-id="pancreas" data-node-type="organ"><rect class="node-shape" x="40" y="44" width="150" height="52" rx="8"/><text class="lbl lbl-t" x="115" y="63" text-anchor="middle" dominant-baseline="central">Поджелудочная</text><text class="lbl lbl-s" x="115" y="81" text-anchor="middle" dominant-baseline="central">β-клетки</text></g>
<g class="node" data-node-id="insulin" data-node-type="hormone"><rect class="node-shape" x="230" y="44" width="150" height="52" rx="8"/><text class="lbl lbl-t" x="305" y="70" text-anchor="middle" dominant-baseline="central">Инсулин</text></g>
<g class="node" data-node-id="insulin_receptor" data-node-type="receptor"><rect class="node-shape" x="420" y="44" width="150" height="52" rx="8"/><text class="lbl lbl-t" x="495" y="63" text-anchor="middle" dominant-baseline="central">Рецептор</text><text class="lbl lbl-s" x="495" y="81" text-anchor="middle" dominant-baseline="central">инсулина</text></g>
<g class="node" data-node-id="muscle" data-node-type="target"><rect class="node-shape" x="610" y="44" width="60" height="52" rx="8"/><text class="lbl lbl-t" x="640" y="70" text-anchor="middle" dominant-baseline="central">Ткани</text></g>

<g class="node" data-node-id="glucose" data-node-type="marker"><rect class="node-shape" x="230" y="200" width="150" height="46" rx="8"/><text class="lbl lbl-t" x="305" y="223" text-anchor="middle" dominant-baseline="central">Глюкоза</text></g>
<g class="node" data-node-id="homa" data-node-type="index"><rect class="node-shape" x="55" y="222" width="150" height="46" rx="8"/><text class="lbl lbl-t" x="130" y="245" text-anchor="middle" dominant-baseline="central">HOMA-IR</text></g>
<g class="node" data-node-id="hba1c" data-node-type="marker"><rect class="node-shape" x="405" y="222" width="150" height="46" rx="8"/><text class="lbl lbl-t" x="480" y="245" text-anchor="middle" dominant-baseline="central">HbA1c</text></g>
<g class="node" data-node-id="c_peptide" data-node-type="marker"><rect class="node-shape" x="490" y="150" width="150" height="44" rx="8"/><text class="lbl lbl-t" x="565" y="172" text-anchor="middle" dominant-baseline="central">C-пептид</text></g>
<line x1="490" y1="172" x2="452" y2="172" class="edge"/>
</svg>
