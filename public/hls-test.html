<!doctype html><meta charset=utf-8><video id=v controls autoplay muted playsinline style="height:600px;background:#000"></video><script type="module">
import Hls from '/node_modules/.vite/deps/hls__js.js?v=8b91a871';
const url = new URL(location.href).searchParams.get('u');
const hls = new Hls({enableWorker:true, lowLatencyMode:false, debug:true});
window.hls=hls; window.v=document.getElementById('v');
hls.on(Hls.Events.MEDIA_ATTACHED,()=>{console.log('media'); hls.loadSource(url);});
hls.on(Hls.Events.MANIFEST_PARSED,(e,d)=>{console.log('parsed '+JSON.stringify({levels:d.levels.length,first:d.firstLevel})); hls.startLoad(); v.play().catch(e=>console.log('play err '+e.message));});
hls.on(Hls.Events.LEVEL_LOADED,(e,d)=>console.log('level loaded '+JSON.stringify({level:d.level,details:!!d.details,frags:d.details?.fragments?.length})));
hls.on(Hls.Events.FRAG_LOADED,(e,d)=>console.log('frag loaded '+d.frag.sn));
hls.on(Hls.Events.ERROR,(e,d)=>console.log('ERROR '+JSON.stringify({type:d.type, details:d.details, fatal:d.fatal, url:d.url, error:d.error?.message})));
hls.attachMedia(v);
setInterval(()=>console.log('state '+JSON.stringify({readyState:v.readyState,currentTime:v.currentTime,paused:v.paused,levels:hls.levels?.length,currentLevel:hls.currentLevel,loadLevel:hls.loadLevel})),2000)
</script>
