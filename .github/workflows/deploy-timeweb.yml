name: Deploy to Timeweb

# Триггерит деплой на Timeweb после каждого пуша в main.
# Передаёт commit_sha в edge-функцию, которая хранит TIMEWEB_API_TOKEN
# в секретах Lovable Cloud — в GitHub секреты добавлять не нужно.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-timeweb:
    runs-on: ubuntu-latest
    steps:
      - name: Call Timeweb deploy edge function
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          URL="https://bpbwkizvvythqotcyfii.supabase.co/functions/v1/trigger-timeweb-deploy"
          echo "POST $URL (commit $COMMIT_SHA)"
          http_code=$(curl --fail-with-body --retry 3 --retry-delay 5 --connect-timeout 15 --max-time 120 -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -d "{\"commit_sha\":\"$COMMIT_SHA\"}")
          echo "HTTP $http_code"
          cat /tmp/resp.txt || true
          echo ""
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Timeweb deploy trigger failed"
            exit 1
          fi
